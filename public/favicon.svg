<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" role="img" aria-label="Dávid Kaya terminal prompt">
  <defs>
    <linearGradient id="terminal" x1="16" y1="10" x2="112" y2="118" gradientUnits="userSpaceOnUse">
      <stop stop-color="#071317" />
      <stop offset="0.52" stop-color="#021f25" />
      <stop offset="1" stop-color="#01070a" />
    </linearGradient>
    <linearGradient id="edge" x1="16" y1="16" x2="112" y2="112" gradientUnits="userSpaceOnUse">
      <stop stop-color="#22d3ee" />
      <stop offset="1" stop-color="#00ff9c" />
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="2.2" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <rect width="128" height="128" rx="28" fill="url(#terminal)" />
  <rect x="10" y="10" width="108" height="108" rx="22" fill="none" stroke="url(#edge)" stroke-width="5" />
  <path d="M22 38h84" stroke="#123941" stroke-width="4" stroke-linecap="round" opacity="0.8" />
  <circle cx="32" cy="26" r="4" fill="#ff5f56" />
  <circle cx="46" cy="26" r="4" fill="#ffbd2e" />
  <circle cx="60" cy="26" r="4" fill="#27c93f" />

  <path
    d="M38 55 58 68 38 81"
    fill="none"
    stroke="#00ff9c"
    stroke-linecap="round"
    stroke-linejoin="round"
    stroke-width="11"
    filter="url(#glow)"
  />
  <path
    d="M70 82h23"
    fill="none"
    stroke="#22d3ee"
    stroke-linecap="round"
    stroke-width="11"
    filter="url(#glow)"
  />
  <path d="M24 100h80" stroke="#22d3ee" stroke-linecap="round" stroke-width="3" opacity="0.25" />
</svg>
